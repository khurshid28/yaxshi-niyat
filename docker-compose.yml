services:
  postgres:
    image: postgres:16
    container_name: yaxshiniyat-pg
    environment:
      POSTGRES_DB: dboyaxshiniyat
      POSTGRES_USER: yaxshiniyat
      POSTGRES_PASSWORD: "ImM9J~w78v21"
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yaxshiniyat -d dboyaxshiniyat']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yaxshiniyat-app
    environment:
      - POSTGRES_URL=postgres://yaxshiniyat:ImM9J~w78v21@postgres:5432/dboyaxshiniyat
      - PAYLOAD_SECRET=75c98a9def0e3a58eaabcc5e
      - NEXT_PUBLIC_SERVER_URL=http://217.29.112.250
      - SITE_URL=http://217.29.112.250
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: yaxshiniyat-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata: